    async function fetchCardsFromSupabase(sectionId) {
      const { data, error } = await supabase
        .from('daily_cards')
        .select('*')
        .eq('section_id', sectionId)
        .order('created_at', { ascending: true });
      if (error) console.error('Fetch error:', error);
      console.log('Fetched cards for', sectionId, data?.length);
      return data || [];
    }

    function getClientX(e) {
      if (typeof e.clientX === 'number') return e.clientX;
      if (e.touches?.[0]) return e.touches[0].clientX;
      if (e.changedTouches?.[0]) return e.changedTouches[0].clientX;
      return 0;
    }

    function SwipeCard({ card, image, sec, onSwipeOut, onCardTap, isTop, stackIndex }) {
      const [startX, setStartX] = React.useState(null);
      const [deltaX, setDeltaX] = React.useState(0);
      const [gone, setGone] = React.useState(false);

      const threshold = 80;
      const rotation = deltaX * 0.1;
      const opacity = isTop ? 1 : 0.95 - stackIndex * 0.05;
      const scale = 1 - stackIndex * 0.04;
      const translateY = stackIndex * 8;

      function getX(e) {
        return e.touches ? e.touches[0].clientX : e.clientX;
      }

      function onStart(e) {
        if (!isTop) return;
        setStartX(getX(e));
      }

      function onMove(e) {
        if (!isTop || startX === null) return;
        setDeltaX(getX(e) - startX);
      }

      function onEnd() {
        if (!isTop || startX === null) return;
        if (Math.abs(deltaX) > threshold) {
          const dir = deltaX > 0 ? 'right' : 'left';
          setGone(true);
          setTimeout(() => onSwipeOut(dir), 300);
        } else {
          if (Math.abs(deltaX) < 5) onCardTap(card);
          setDeltaX(0);
          setStartX(null);
        }
      }

      const style = {
        position: 'absolute',
        top: 0, left: 0, right: 0, bottom: 0,
        transform: gone
          ? `translateX(${deltaX > 0 ? 150 : -150}%) rotate(${rotation}deg)`
          : `translateX(${deltaX}px) rotate(${rotation}deg) scale(${scale}) translateY(${translateY}px)`,
        transition: (startX !== null && !gone) ? 'none' : 'transform 0.3s ease',
        opacity: gone ? 0 : opacity,
        cursor: isTop ? 'grab' : 'default',
        pointerEvents: isTop ? 'auto' : 'none',
        userSelect: 'none',
        borderRadius: 20,
        overflow: 'hidden',
        background: '#FAF7F2',
      };

      return (
        <div
          style={style}
          onMouseDown={onStart}
          onMouseMove={onMove}
          onMouseUp={onEnd}
          onMouseLeave={onEnd}
          onTouchStart={onStart}
          onTouchMove={onMove}
          onTouchEnd={onEnd}
        >
          <div style={{ position: 'relative', height: '52%', background: '#1a1a1a', overflow: 'hidden' }}>
            {image && <img src={image} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />}
            {card.tag && (
              <div style={{ position: 'absolute', bottom: 12, left: 12, background: sec.color, color: '#fff', fontSize: 10, fontWeight: 700, letterSpacing: 1.5, padding: '4px 10px', borderRadius: 20, fontFamily: 'Outfit, sans-serif', textTransform: 'uppercase' }}>
                {card.tag}
              </div>
            )}
            {deltaX > 40 && <div style={{ position: 'absolute', top: 20, left: 20, border: '3px solid #4CAF50', borderRadius: 8, padding: '4px 12px', color: '#4CAF50', fontWeight: 800, fontSize: 18, transform: 'rotate(-15deg)' }}>SAVE</div>}
            {deltaX < -40 && <div style={{ position: 'absolute', top: 20, right: 20, border: '3px solid #f44336', borderRadius: 8, padding: '4px 12px', color: '#f44336', fontWeight: 800, fontSize: 18, transform: 'rotate(15deg)' }}>SKIP</div>}
          </div>
          <div style={{ padding: '16px 18px', height: '48%', boxSizing: 'border-box', overflow: 'hidden' }}>
            <div style={{ fontSize: 22, marginBottom: 4 }}>{card.emoji}</div>
            <div style={{ fontFamily: 'Cormorant Garamond, serif', fontSize: 20, fontWeight: 700, color: '#2C1810', marginBottom: 8, lineHeight: 1.2 }}>{card.title}</div>
            <div style={{ fontFamily: 'Outfit, sans-serif', fontSize: 13, color: '#5a4a3a', lineHeight: 1.5 }}>{card.body}</div>
          </div>
        </div>
      );
    }

                {saved.map((c, i) => (

              </div>
            )}
            <button
              type="button"
              onClick={() => { setIdx(0); setSaved([]); setShowSaved(false); }}

      return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>

            {cards.map((_, i) => (

                style={{
                  height: 2.5,

                  background: i < idx ? sec.color : i === idx ? `${E.clay}99` : `${E.clay}28`,

            <span style={{ fontFamily: "'Outfit', sans-serif", fontSize: 11, color: E.clay, marginLeft: 8, letterSpacing: 0.5, whiteSpace: 'nowrap' }}>{cards.length - idx} left</span>
          </div>
          <div style={{ position: 'relative', flex: 1 }}>
            {[...visible].reverse().map((card, revI) => {
              const stackIdx = visible.length - 1 - revI;
              const absIdx = idx + stackIdx;
              return (
                <SwipeCard

    function EstralApp() {
      const [active, setActive] = useState(0);
      const navRef = useRef(null);
      const touchStartX = useRef(null);
      const sec = SECTIONS[active];

      useEffect(() => {
        if (!navRef.current) return;
        const btns = navRef.current.querySelectorAll('button');
        btns[active]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }, [active]);

      const onTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
      const onTouchEnd = (e) => {
        if (touchStartX.current === null) return;
        const dx = e.changedTouches[0].clientX - touchStartX.current;
        if (Math.abs(dx) > 70) {
          if (dx < 0 && active < SECTIONS.length - 1) setActive((i) => i + 1);
          if (dx > 0 && active > 0) setActive((i) => i - 1);
        }
        touchStartX.current = null;
      };

      return (

            style={{
              display: 'flex',
              justifyContent: 'center',
              alignItems: 'center',
              gap: 7,
              padding: '10px 0 20px',
              position: 'relative',
              zIndex: 10,
              flexShrink: 0,
            }}
          >
            {SECTIONS.map((s, i) => (
              <button
                key={s.id}
                type="button"
                onClick={() => setActive(i)}
                style={{
                  width: active === i ? 24 : 7,
                  height: 7,
                  borderRadius: 4,
                  background: active === i ? s.color : `${E.clay}40`,
                  border: 'none',
                  cursor: 'pointer',
                  padding: 0,
                  transition: 'all 0.32s cubic-bezier(0.34, 1.56, 0.64, 1)',
                }}
              />
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EstralApp />);
  </script>
</body>
</html>
